<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Apartment Rental</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <!-- Navbar -->
    <nav class="bg-white shadow-md p-4 flex justify-between items-center">
        <h1 class="text-xl font-semibold text-gray-800">Apartment Rental</h1>
        <div>
            <span class="text-gray-600 mr-4">Hello, {{ session['user'] }}</span>
            <a href="{{ url_for('routes.logout') }}" 
               class="text-purple-600 hover:text-purple-800 font-medium transition">Logout</a>
        </div>
    </nav>

    <main class="p-6">
        <!-- Dashboard Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            
            <div class="bg-white rounded-xl shadow-sm p-5 flex flex-col items-center">
                <div class="text-gray-400 mb-2">Total Apartments</div>
                <div class="text-2xl font-bold text-gray-800">{{ total_apartments }}</div>
            </div>

            <div class="bg-white rounded-xl shadow-sm p-5 flex flex-col items-center">
                <div class="text-gray-400 mb-2">Total Tenants</div>
                <div class="text-2xl font-bold text-gray-800">{{ total_tenants }}</div>
            </div>

            <div class="bg-white rounded-xl shadow-sm p-5 flex flex-col items-center">
                <div class="text-gray-400 mb-2">Active Rentals</div>
                <div class="text-2xl font-bold text-gray-800">{{ active_rentals }}</div>
            </div>

            <div class="bg-white rounded-xl shadow-sm p-5 flex flex-col items-center">
                <div class="text-gray-400 mb-2">Pending Maintenance</div>
                <div class="text-2xl font-bold text-gray-800">{{ pending_maintenance }}</div>
            </div>

        </div>

        <!-- Quick Links -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <a href="{{ url_for('routes.tenants') }}" 
               class="bg-purple-50 text-purple-700 rounded-xl p-6 shadow hover:bg-purple-100 transition">
                View Tenants
            </a>
            <a href="{{ url_for('routes.apartments') }}" 
               class="bg-green-50 text-green-700 rounded-xl p-6 shadow hover:bg-green-100 transition">
                View Apartments
            </a>
            <a href="{{ url_for('routes.rentals') }}" 
               class="bg-blue-50 text-blue-700 rounded-xl p-6 shadow hover:bg-blue-100 transition">
                View Rentals
            </a>
            <a href="{{ url_for('routes.payments') }}" 
               class="bg-yellow-50 text-yellow-700 rounded-xl p-6 shadow hover:bg-yellow-100 transition">
                View Payments
            </a>
            <a href="{{ url_for('routes.maintenance') }}" 
               class="bg-pink-50 text-pink-700 rounded-xl p-6 shadow hover:bg-pink-100 transition">
                View Maintenance
            </a>
        </div>
    </main>

</body>
</html>
