<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tenants - Apartment Rental</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <!-- Navbar -->
    <nav class="bg-white shadow-md p-4 flex justify-between items-center">
        <h1 class="text-xl font-semibold text-gray-800">Apartment Rental</h1>
        <div>
            <span class="text-gray-600 mr-4">Hello, {{ session['user'] }}</span>
            <a href="{{ url_for('routes.logout') }}" 
               class="text-purple-600 hover:text-purple-800 font-medium transition">Logout</a>
        </div>
    </nav>

    <main class="p-6">
        <!-- Page Header -->
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-semibold text-gray-800">Tenants</h2>
            <a href="{{ url_for('routes.add_tenant') }}" 
               class="bg-purple-200 text-purple-800 px-4 py-2 rounded-lg hover:bg-purple-300 transition">
                Add Tenant
            </a>
        </div>

        <!-- Tenants Table -->
        <div class="bg-white shadow-md rounded-lg overflow-x-auto">
            <table class="min-w-full table-auto">
                <thead class="bg-gray-50">
                    <tr class="text-left text-gray-600">
                        <th class="px-6 py-3">ID</th>
                        <th class="px-6 py-3">Name</th>
                        <th class="px-6 py-3">Phone</th>
                        <th class="px-6 py-3">Email</th>
                        <th class="px-6 py-3">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    {% for tenant in tenants %}
                        <tr class="hover:bg-gray-50 transition">
                            <td class="px-6 py-3 text-gray-700">{{ tenant.Tenant_ID }}</td>
                            <td class="px-6 py-3 text-gray-700">{{ tenant.Name }}</td>
                            <td class="px-6 py-3 text-gray-700">{{ tenant.Phone }}</td>
                            <td class="px-6 py-3 text-gray-700">{{ tenant.Email }}</td>
                            <td class="px-6 py-3 space-x-2">
                                <a href="{{ url_for('routes.update_tenant', tenant_id=tenant.Tenant_ID) }}" 
                                   class="bg-blue-100 text-blue-700 px-3 py-1 rounded hover:bg-blue-200 transition text-sm">
                                   Edit
                                </a>
                                <a href="{{ url_for('routes.delete_tenant', tenant_id=tenant.Tenant_ID) }}" 
                                   onclick="return confirm('Are you sure you want to delete this tenant?')"
                                   class="bg-red-100 text-red-700 px-3 py-1 rounded hover:bg-red-200 transition text-sm">
                                   Delete
                                </a>
                            </td>
                        </tr>
                    {% else %}
                        <tr>
                            <td colspan="5" class="px-6 py-4 text-center text-gray-400">
                                No tenants found.
                            </td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </main>

</body>
</html>
