<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Maintenance - Apartment Rental</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <!-- Navbar -->
    <nav class="bg-white shadow-md p-4 flex justify-between items-center">
        <h1 class="text-xl font-semibold text-gray-800">Apartment Rental</h1>
        <div>
            <span class="text-gray-600 mr-4">Hello, {{ session['user'] }}</span>
            <a href="{{ url_for('routes.logout') }}" class="text-purple-600 hover:text-purple-800 font-medium transition">Logout</a>
        </div>
    </nav>

    <main class="p-6 max-w-md mx-auto">
        <h2 class="text-2xl font-semibold text-gray-800 mb-6 text-center">Update Maintenance Request</h2>

        <form method="POST" action="{{ url_for('routes.update_maintenance_web', maintenance_id=maintenance.Maintenance_ID) }}" class="bg-white p-6 rounded-lg shadow-md">
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-1">Tenant</label>
                <select name="tenant_id" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-200 focus:border-purple-300 transition duration-200">
                    {% for tenant in tenants %}
                        <option value="{{ tenant.Tenant_ID }}" {% if tenant.Tenant_ID == maintenance.Tenant_ID %}selected{% endif %}>{{ tenant.Name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-1">Apartment</label>
                <select name="apt_id" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-200 focus:border-purple-300 transition duration-200">
                    {% for apartment in apartments %}
                        <option value="{{ apartment.Apt_ID }}" {% if apartment.Apt_ID == maintenance.Apt_ID %}selected{% endif %}>{{ apartment.Building_Name }} - {{ apartment.Type }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-1">Issue</label>
                <input type="text" name="issue" value="{{ maintenance.Issue }}" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-200 focus:border-purple-300 transition duration-200">
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-1">Request Date</label>
                <input type="date" name="request_date" value="{{ maintenance.Request_Date }}" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-200 focus:border-purple-300 transition duration-200">
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 font-medium mb-1">Status</label>
                <select name="status" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-200 focus:border-purple-300 transition duration-200">
                    <option value="Pending" {% if maintenance.Status=='Pending' %}selected{% endif %}>Pending</option>
                    <option value="Resolved" {% if maintenance.Status=='Resolved' %}selected{% endif %}>Resolved</option>
                </select>
            </div>

            <button type="submit" class="w-full py-2 rounded-lg bg-blue-200 text-blue-800 font-medium hover:bg-blue-300 transition duration-200">
                Update Request
            </button>
        </form>
    </main>

</body>
</html>
