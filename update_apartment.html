<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Apartment - Apartment Rental</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <!-- Navbar -->
    <nav class="bg-white shadow-md p-4 flex justify-between items-center">
        <h1 class="text-xl font-semibold text-gray-800">Apartment Rental</h1>
        <div>
            <span class="text-gray-600 mr-4">Hello, {{ session['user'] }}</span>
            <a href="{{ url_for('routes.logout') }}" class="text-purple-600 hover:text-purple-800 font-medium transition">Logout</a>
        </div>
    </nav>

    <main class="p-6 max-w-md mx-auto">
        <h2 class="text-2xl font-semibold text-gray-800 mb-6 text-center">Update Apartment</h2>

        <form method="POST" action="{{ url_for('routes.update_apartment_web', apt_id=apartment.Apt_ID) }}" class="bg-white p-6 rounded-lg shadow-md">
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-1">Building Name</label>
                <input type="text" name="building_name" value="{{ apartment.Building_Name }}" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-200 focus:border-purple-300 transition duration-200">
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-1">Type</label>
                <input type="text" name="type" value="{{ apartment.Type }}" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-200 focus:border-purple-300 transition duration-200">
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-1">Rent Amount</label>
                <input type="number" name="rent_amount" value="{{ apartment.Rent_Amount }}" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-200 focus:border-purple-300 transition duration-200">
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 font-medium mb-1">Status</label>
                <select name="status" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-200 focus:border-purple-300 transition duration-200">
                    <option value="Available" {% if apartment.Status == 'Available' %}selected{% endif %}>Available</option>
                    <option value="Rented" {% if apartment.Status == 'Rented' %}selected{% endif %}>Rented</option>
                </select>
            </div>

            <button type="submit"
                    class="w-full py-2 rounded-lg bg-blue-200 text-blue-800 font-medium hover:bg-blue-300 transition duration-200">
                Update Apartment
            </button>
        </form>
    </main>

</body>
</html>
