<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Apartment Rental</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white rounded-xl shadow-md p-10 w-full max-w-sm">
        <h2 class="text-3xl font-semibold mb-6 text-center text-gray-800">
            Apartment Rental
        </h2>
        <p class="text-center text-gray-500 mb-8 text-sm">
            Hello!! Login to continue.
        </p>

        {% if error %}
            <div class="bg-red-50 text-red-600 p-3 rounded mb-4 text-center text-sm">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" action="{{ url_for('routes.login') }}">
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-1">Username</label>
                <input type="text" name="username" placeholder="Enter username"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-200 focus:border-purple-300 transition duration-200">
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 font-medium mb-1">Password</label>
                <input type="password" name="password" placeholder="Enter password"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-200 focus:border-purple-300 transition duration-200">
            </div>

            <button type="submit" 
                class="w-full py-2 rounded-lg bg-purple-200 text-purple-800 font-medium hover:bg-purple-300 transition duration-200">
                Login
            </button>
        </form>

        <p class="text-center text-gray-400 mt-6 text-xs">
            &copy; 2025 Apartment Rental System
        </p>
    </div>

</body>
</html>
